name: Sync Figma Variables
on:
  repository_dispatch:
    types: [figma_publish]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Pull variables from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_ID: ${{ github.event.client_payload.fileId }}
        run: npm run pull:figma
      - run: npm run build
      - name: Commit changes
        run: |
          git config user.name "figma-bot"
          git config user.email "figma-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore(tokens): sync from Figma" || echo "No changes"
          git push
