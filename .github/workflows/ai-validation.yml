name: AI Governance Validation

on:
  pull_request:
    paths:
      - "ai-generated/**"

jobs:
  validate-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build package (for AI layer imports)
        run: npm run build

      - name: Detect override label
        id: override
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ai-override') }}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate AI output
        continue-on-error: ${{ steps.override.outputs.enabled == 'true' }}
        run: node scripts/validate-ai-output.mjs

      - name: Enforce drift rules
        continue-on-error: ${{ steps.override.outputs.enabled == 'true' }}
        run: node scripts/enforce-ai-usage.mjs

      - name: Diff token usage
        continue-on-error: ${{ steps.override.outputs.enabled == 'true' }}
        run: node scripts/diff-token-usage.mjs

      - name: Enforce override approval policy
        if: ${{ steps.override.outputs.enabled == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            const approvedBy = new Set();
            for (const review of reviews) {
              if (review.state === "APPROVED") approvedBy.add(review.user.login);
            }
            if (approvedBy.size < 2) {
              core.setFailed(`ai-override requires at least 2 approvals. Found ${approvedBy.size}.`);
            }

      - name: Upload AI metadata artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-governance-artifacts
          path: ai-generated/metadata/
          if-no-files-found: ignore
